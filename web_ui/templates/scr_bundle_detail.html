<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ label }} · 组合扫描详情</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: #07101f; color: #e2e8f0;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, "Segoe UI", system-ui, sans-serif;
      line-height: 1.6; min-height: 100vh;
    }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { color: #7dd3fc; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px 36px 60px; }

    .topnav {
      display: flex; gap: 4px; align-items: center;
      border-bottom: 1px solid #1e3354;
      margin-bottom: 22px; padding-bottom: 0;
    }
    .nav-tab {
      padding: 12px 22px; font-weight: 600; color: #94a3b8;
      border-radius: 8px 8px 0 0; margin-bottom: -1px;
      border: 1px solid transparent; border-bottom: none;
    }
    .nav-tab:hover { background: #0e1a2f; color: #f1f5f9; }
    .nav-tab.active {
      background: #0e1a2f; color: #38bdf8;
      border-color: #1e3354; border-bottom-color: #0e1a2f;
    }
    .public-badge {
      margin-left: auto; padding: 4px 12px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.5px; border-radius: 999px; text-transform: uppercase;
      background: #fef3c7; color: #7c5400; border: 1px solid #f5d57b;
    }

    .crumb { color: #64748b; font-size: 12px; margin-bottom: 18px; letter-spacing: 0.5px; }
    .crumb a { color: #94a3b8; }
    h1 { margin: 0 0 4px; font-size: 24px; color: #f8fafc; }
    .meta { color: #64748b; font-size: 12px; margin-bottom: 22px; font-family: ui-monospace, Consolas, monospace; }

    /* Reuse bundle-* styles */
    .bundle-result { margin-top: 4px; }
    .bundle-hero {
      display: grid; grid-template-columns: 1fr auto; gap: 28px;
      padding: 26px 32px; border-radius: 14px; border: 2px solid;
      background: linear-gradient(135deg, #0b1729 0%, #122544 60%, #0b1729 100%);
      margin-bottom: 16px;
    }
    .bundle-hero.v-mal      { border-color: rgba(239,68,68,0.55); }
    .bundle-hero.v-medium   { border-color: rgba(245,158,11,0.55); }
    .bundle-hero.v-safe-h   { border-color: rgba(34,197,94,0.55); }
    .bh-label { color: #94a3b8; font-size: 11px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }
    .bh-verdict { font-size: 40px; font-weight: 800; margin: 8px 0 4px; letter-spacing: 2px; }
    .v-mal .bh-verdict      { color: #fca5a5; }
    .v-medium .bh-verdict   { color: #fcd34d; }
    .v-safe-h .bh-verdict   { color: #86efac; }
    .bh-sub { color: #64748b; font-size: 13px; font-family: ui-monospace, Consolas, monospace; }
    .bh-right { text-align: right; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
    .bh-stat { color: #cbd5e1; font-size: 13px; }
    .bh-stat span { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-right: 4px; }
    .bh-stat-sub { color: #64748b; font-size: 11px; margin-top: 6px; }
    .bh-target-row {
      padding: 8px 14px; background: #0a1424; border-radius: 8px;
      border: 1px solid #1e3354; margin-bottom: 16px; font-size: 12px;
    }
    .bh-target-row code {
      background: transparent; padding: 0; color: #cbd5e1;
      font-family: ui-monospace, Consolas, monospace;
    }
    .bundle-panel {
      background: #0a1424; border: 1px solid #1e3354; border-radius: 10px;
      padding: 18px 22px; margin-bottom: 14px;
    }
    .bp-title {
      color: #cbd5e1; font-size: 14px; font-weight: 600;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .bp-body { color: #94a3b8; font-size: 13px; line-height: 1.7; }
    .bp-sub {
      color: #cbd5e1; font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      margin: 14px 0 8px; padding-top: 12px;
      border-top: 1px solid #1e293b;
    }
    .skill-panel { border-color: rgba(56,189,248,0.2); }
    .skill-md-pre {
      background: #07101f; padding: 14px 16px; border-radius: 8px;
      color: #cbd5e1; font-family: ui-monospace, Consolas, monospace;
      font-size: 11px; max-height: 380px; overflow: auto;
      white-space: pre-wrap; word-break: break-word;
      border: 1px solid #1e293b;
      line-height: 1.5;
    }
    .v-mal { background: rgba(239,68,68,0.18); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }
    .v-medium { background: rgba(245,158,11,0.18); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }
    .v-unknown { background: rgba(100,116,139,0.18); color: #cbd5e1; border: 1px solid rgba(100,116,139,0.4); }

    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1e3354; }
    th { color: #94a3b8; font-weight: 600; font-size: 12px; background: #122544; }
    .scr-table th { background: #122544; }
    .muted { color: #64748b; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }
    .v-warn { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.4); }
    code {
      background: #07101f; padding: 2px 6px; border-radius: 4px;
      font-family: ui-monospace, Consolas, monospace; font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <nav class="topnav">
      <a class="nav-tab" href="/">扫描</a>
      <a class="nav-tab" href="/results">已扫 skill</a>
      <a class="nav-tab active" href="/scr-bench">组合性风险</a>
      {{ public_badge }}
    </nav>

    <div class="crumb">
      <a href="/scr-bench">组合性风险</a> › 历史详情
    </div>

    <h1>{{ label }}</h1>
    <div class="meta">{{ bundle_id }}</div>

    {{ detail_html }}
  </main>
</body>
</html>
